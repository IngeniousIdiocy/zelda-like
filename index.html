<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Legend of Shank</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #eee;
        font-family: 'Courier New', monospace;
        height: 100%;
        overflow: hidden;
      }
      #game-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 8px;
      }
      #game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #000;
        border: 2px solid #444;
        box-shadow: 0 0 40px rgba(0, 200, 255, 0.1);
        max-width: 100%;
        max-height: calc(100vh - 60px);
      }
      #controls {
        font-size: 12px;
        color: #888;
        text-align: center;
      }
      #controls b { color: #ccc; }
    </style>
  </head>
  <body>
    <div id="game-wrap">
      <canvas id="game" width="512" height="448" tabindex="0"></canvas>
      <div id="controls">
        <b>Arrows/WASD</b> move · <b>Z/J</b> sword · <b>X/K</b> use item · <b>C/L</b> cycle item · <b>Enter</b> pause/start · <b>M</b> mute
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
